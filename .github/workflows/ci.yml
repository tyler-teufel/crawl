name: CI

on:
  pull_request:
    branches: [main, 'release**']
  push:
    branches: [main, 'release**']

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Turbo-affected lint / typecheck / test ─────────────────────────
  validate:
    name: Validate (lint, typecheck, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v6
        with:
          # Required for Turbo affected detection (`...[origin/main]`)
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Turbo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # On PRs we only run on packages affected since `origin/main`.
      # On pushes to main we run everything to keep the cache warm.
      - name: Determine Turbo filter
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "filter=--filter=...[origin/${{ github.base_ref }}]" >> "$GITHUB_OUTPUT"
          else
            echo "filter=" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint, typecheck, test
        run: npx turbo run lint typecheck test ${{ steps.filter.outputs.filter }} --cache-dir=.turbo

      - name: Upload API coverage (if produced)
        if: always() && hashFiles('apps/api/coverage/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: api-coverage
          path: apps/api/coverage
          retention-days: 7
          if-no-files-found: ignore

  # ── Mobile bundle gate (catch build/boot failures before TestFlight) ──
  # Shift-left: fail here in ~minutes instead of 30 minutes downstream at
  # TestFlight. `expo export` builds the real shippable JS bundle (catches
  # import/resolve/transform/config errors); the vitest boot-smoke suite in the
  # `validate` job executes the boot-chain modules (catches module-load throws
  # that bundling alone cannot).
  mobile-bundle:
    name: Mobile — Doctor + Export bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      # Advisory for now (flags dependency/version drift, e.g. unpinned deps).
      # Promote to blocking once the reported issues are cleared.
      - name: Expo Doctor (advisory)
        working-directory: apps/mobile
        continue-on-error: true
        run: npx expo-doctor

      - name: Verify env matrix
        working-directory: apps/mobile
        run: node scripts/verify-env.mjs --mode mock

      - name: Export production JS bundle
        working-directory: apps/mobile
        env:
          # Never attempt a Sentry source-map upload from CI.
          SENTRY_DISABLE_AUTO_UPLOAD: 'true'
          # Dummy public config so the export represents a fully-configured
          # build and exercises EXPO_PUBLIC_* inlining. Not real credentials.
          EXPO_PUBLIC_SUPABASE_URL: 'https://ci-dummy.supabase.co'
          EXPO_PUBLIC_SUPABASE_KEY: 'sb_publishable_ci_dummy'
          EXPO_PUBLIC_API_URL: 'https://ci-dummy.example/api/v1'
        run: npx expo export --platform ios --output-dir dist

  # ── Native fingerprint (Expo OTA eligibility) ─────────────────────
  fingerprint:
    name: Mobile — Native Fingerprint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      fingerprint-hash: ${{ steps.fingerprint.outputs.hash }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - name: Generate native fingerprint
        id: fingerprint
        working-directory: apps/mobile
        run: |
          HASH=$(npx @expo/fingerprint . --hash-only 2>/dev/null || echo "unknown")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Fingerprint: $HASH"
