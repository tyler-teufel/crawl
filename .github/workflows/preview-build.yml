# Builds and publishes to the staging EAS channel on every push to main.
# "Preview" here means a post-merge build for human review — not the pre-production environment.
# The pre-production environment is called "staging" everywhere in this project.
name: Preview Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: preview-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      # iOS internal-distribution credentials are not yet configured on EAS.
      # Once `eas credentials` has been run and Apple creds are stored, change
      # --platform android back to --platform all.
      - name: Build Android (staging)
        working-directory: apps/mobile
        run: eas build --platform android --profile staging --non-interactive
