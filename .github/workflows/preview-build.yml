# Builds and publishes to the staging EAS channel on every push to main.
# "Preview" here means a post-merge build for human review — not the pre-production environment.
# The pre-production environment is called "staging" everywhere in this project.
name: Preview Build

on:
  push:
    branches: [main]

concurrency:
  group: preview-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build iOS & Android (staging)
        run: eas build --platform all --profile staging --non-interactive
