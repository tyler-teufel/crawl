name: API Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared-types/**'
      - 'docker-compose.yml'
      - '.github/workflows/api-deploy.yml'

concurrency:
  group: api-deploy-${{ github.ref }}
  cancel-in-progress: false # Never cancel in-flight deploys

jobs:
  # ── Lint + Test gate before deploy ────────────────────────────────
  test:
    name: API — Test Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout API Code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Trigger CI
        run: npm ci

      - name: TypeScript check
        working-directory: apps/api
        run: npm run typecheck

      - name: Run tests
        working-directory: apps/api
        run: npm run test

  # ── Build Docker image ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  # ── Deploy to staging ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: Deploy to Railway (staging)
        # Replace with your actual deploy command.
        # Railway: `railway up --service api --environment staging`
        # Render:  `curl -X POST $RENDER_DEPLOY_HOOK_URL`
        # Fly.io:  `flyctl deploy --image ${{ needs.build.outputs.image-tag }}`
        run: |
          echo "Deploy image ${{ needs.build.outputs.image-tag }} to staging"
          echo "Configure STAGING_DEPLOY_HOOK or Railway/Render CLI here."
        # Uncomment when deploy target is configured:
        # env:
        #   RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy to production (gated by approval) ──────────────────────
  deploy-production:
    name: Deploy — Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
      # Requires a GitHub environment protection rule with required reviewers
    steps:
      - name: Deploy to Railway (production)
        run: |
          echo "Deploy image ${{ needs.build.outputs.image-tag }} to production"
          echo "Configure PROD_DEPLOY_HOOK or Railway/Render CLI here."
