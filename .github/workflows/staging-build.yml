# Builds and publishes to the staging EAS channel on every push to main.
# iOS builds use app-store distribution so the binary can be submitted to TestFlight.
# Android builds use internal distribution (download via EAS dashboard link).
name: Staging Build

on:
  push:
    branches: [main, 'release**']
  workflow_dispatch:

concurrency:
  group: staging-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Scopes vars.EXPO_PUBLIC_API_URL to the "staging" GitHub Environment, so
    # the staging build points at the staging Railway API. The production build
    # path resolves the same variable name from the "production" environment.
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Set build number
        working-directory: apps/mobile
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.ios = cfg.expo.ios || {};
            cfg.expo.ios.buildNumber = '${{ github.run_number }}';
            cfg.expo.android = cfg.expo.android || {};
            cfg.expo.android.versionCode = ${{ github.run_number }};
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      # EAS cloud builds do not inherit the runner's environment, so EXPO_PUBLIC_*
      # values must be written into eas.json before `eas build` for Metro to
      # inline them into the bundle (they are resolved at bundle time). These
      # stay out of the repo — they live only in the staging GitHub Environment.
      #   - EXPO_PUBLIC_API_URL:    Railway API base (unset → app uses mock data)
      #   - EXPO_PUBLIC_SENTRY_DSN: enables runtime crash reporting (unset → off)
      - name: Inject staging env into eas.json
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ vars.EXPO_PUBLIC_SENTRY_DSN }}
        run: |
          node -e "
            const fs = require('fs');
            const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            eas.build.staging.env = eas.build.staging.env || {};
            for (const key of ['EXPO_PUBLIC_API_URL', 'EXPO_PUBLIC_SENTRY_DSN']) {
              const val = process.env[key];
              if (val) {
                eas.build.staging.env[key] = val;
                console.log('Injected ' + key + ' into eas.json staging env');
              } else {
                console.log('::warning::' + key + ' is not set for the staging environment');
              }
            }
            fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
          "

      - name: Build (staging)
        working-directory: apps/mobile
        run: eas build --platform ios --profile staging --non-interactive

      - name: Submit iOS to TestFlight (staging)
        working-directory: apps/mobile
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: eas submit --platform ios --profile staging --latest --non-interactive
