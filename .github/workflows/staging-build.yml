# Builds and publishes to the staging EAS channel on every push to main.
# iOS builds use app-store distribution so the binary can be submitted to TestFlight.
# Android builds use internal distribution (download via EAS dashboard link).
name: Staging Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build (staging)
        working-directory: apps/mobile
        run: eas build --platform all --profile staging --non-interactive

      - name: Submit iOS to TestFlight (staging)
        working-directory: apps/mobile
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: eas submit --platform ios --profile staging --latest --non-interactive
