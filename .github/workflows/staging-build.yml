# Builds and publishes to the staging EAS channel on every push to main.
# iOS builds use app-store distribution so the binary can be submitted to TestFlight.
# Android builds use internal distribution (download via EAS dashboard link).
name: Staging Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build (staging)
        working-directory: apps/mobile
        run: eas build --platform all --profile staging --non-interactive
