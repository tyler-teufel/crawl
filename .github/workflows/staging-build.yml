# Builds and publishes to the staging EAS channel on every push to main.
# iOS builds use app-store distribution so the binary can be submitted to TestFlight.
# Android builds use internal distribution (download via EAS dashboard link).
name: Staging Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Scopes vars.EXPO_PUBLIC_API_URL to the "staging" GitHub Environment, so
    # the staging build points at the staging Railway API. The production build
    # path resolves the same variable name from the "production" environment.
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Set build number
        working-directory: apps/mobile
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.ios = cfg.expo.ios || {};
            cfg.expo.ios.buildNumber = '${{ github.run_number }}';
            cfg.expo.android = cfg.expo.android || {};
            cfg.expo.android.versionCode = ${{ github.run_number }};
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      # EAS cloud builds do not inherit the runner's environment, so the value
      # must be written into eas.json before `eas build` for Metro to inline it
      # into the bundle (EXPO_PUBLIC_* are resolved at bundle time). Keeps the
      # URL out of the repo — it lives only in the staging GitHub Environment.
      - name: Inject staging API URL into eas.json
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
        run: |
          node -e "
            const fs = require('fs');
            const url = process.env.EXPO_PUBLIC_API_URL;
            if (!url) {
              console.log('::warning::EXPO_PUBLIC_API_URL is not set for the staging environment — the app will fall back to bundled mock data');
              process.exit(0);
            }
            const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            eas.build.staging.env = eas.build.staging.env || {};
            eas.build.staging.env.EXPO_PUBLIC_API_URL = url;
            fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
            console.log('Injected EXPO_PUBLIC_API_URL into eas.json staging env');
          "

      - name: Build (staging)
        working-directory: apps/mobile
        run: eas build --platform ios --profile staging --non-interactive

      - name: Submit iOS to TestFlight (staging)
        working-directory: apps/mobile
        env:
          EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
          EXPO_ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: eas submit --platform ios --profile staging --latest --non-interactive
